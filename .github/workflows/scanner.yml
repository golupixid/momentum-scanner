name: NSE Momentum Scanner

on:
  # schedule:  # Disabled — trigger manually via workflow_dispatch only
  #   # All times UTC (IST = UTC + 5:30)
  #   - cron: '30 2 * * 1-5'   # 8:00 AM IST  Mon-Fri (pre-market)
  #   - cron: '30 4 * * 1-5'   # 10:00 AM IST Mon-Fri (market open)
  #   - cron: '0 6 * * 1-5'    # 11:30 AM IST Mon-Fri (mid-morning)
  #   - cron: '30 7 * * 1-5'   # 1:00 PM IST  Mon-Fri (midday)
  #   - cron: '30 9 * * 1-5'   # 3:00 PM IST  Mon-Fri (pre-close)
  #   - cron: '30 4 * * 0'     # 10:00 AM IST Sunday  (weekly report)
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Select scan type'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - weekly_report

jobs:
  scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull latest data files
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull origin master

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Debug environment
        shell: bash
        run: |
          echo "=== Python & packages ==="
          python --version
          pip show curl_cffi yfinance pandas python-telegram-bot 2>/dev/null | grep -E "^(Name|Version):"
          echo "=== Network reachability ==="
          curl -s -o /dev/null -w "Yahoo query1: %{http_code}\n" \
            "https://query1.finance.yahoo.com/v8/finance/chart/RELIANCE.NS?range=5d&interval=1d" || true
          curl -s -o /dev/null -w "Yahoo query2: %{http_code}\n" \
            "https://query2.finance.yahoo.com/v8/finance/chart/RELIANCE.NS?range=5d&interval=1d" || true
          curl -s -o /dev/null -w "NSE India: %{http_code}\n" "https://www.nseindia.com" || true
          echo "=== curl_cffi smoke test ==="
          python -c "
          from curl_cffi import requests as cr
          s = cr.Session(impersonate='chrome120')
          r = s.get('https://query1.finance.yahoo.com/v8/finance/chart/RELIANCE.NS?range=5d&interval=1d', timeout=15)
          print(f'curl_cffi status: {r.status_code}')
          try:
              rows = len(r.json().get('chart',{}).get('result',[{}])[0].get('timestamp',[]))
              print(f'curl_cffi data rows: {rows}')
          except Exception as e:
              print(f'parse error: {e}')
          " || echo "curl_cffi test failed (non-fatal)"

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type || 'full' }}
          PYTHONUNBUFFERED: "1"
          PYTHONIOENCODING: "utf-8"
        shell: bash
        run: |
          if [ "$SCAN_TYPE" = "weekly_report" ]; then
            python weekly_report.py
          else
            python main.py --real-run
          fi

      - name: Commit registry update
        if: always()
        shell: bash
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add data/active_signals/active_signals.csv || true
          git add data/daily_shown/caution_shown.csv || true
          git add data/daily_shown/watchlist_shown.csv || true
          git diff --staged --quiet || git commit -m "chore: update registry and daily shown [skip ci]"
          git push
