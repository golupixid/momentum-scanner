name: NSE Momentum Scanner

on:
  schedule:
    # All times UTC (IST = UTC + 5:30)
    - cron: '30 2 * * 1-5'   # 8:00 AM IST  Mon-Fri (pre-market)
    - cron: '30 4 * * 1-5'   # 10:00 AM IST Mon-Fri (market open)
    - cron: '0 6 * * 1-5'    # 11:30 AM IST Mon-Fri (mid-morning)
    - cron: '30 7 * * 1-5'   # 1:00 PM IST  Mon-Fri (midday)
    - cron: '30 9 * * 1-5'   # 3:00 PM IST  Mon-Fri (pre-close)
    - cron: '30 4 * * 0'     # 10:00 AM IST Sunday  (weekly report)
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'What to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - premarket
          - weekly_report
          - dry_run

# ── IMPORTANT ─────────────────────────────────────────────────────────────────
# Yahoo Finance blocks GitHub-hosted runner IPs. This scanner MUST run on a
# self-hosted runner (your own Windows machine). See README for setup steps.
# ──────────────────────────────────────────────────────────────────────────────

jobs:
  scanner:
    # Use self-hosted runner (your Windows PC). To fall back to GitHub-hosted
    # runners (data will fail), change to: runs-on: ubuntu-latest
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCAN_TYPE: ${{ github.event.inputs.scan_type || 'auto' }}
        shell: bash
        run: |
          if [ "$SCAN_TYPE" = "weekly_report" ]; then
            python weekly_report.py
          elif [ "$SCAN_TYPE" = "dry_run" ]; then
            python main.py --dry-run
          elif [ "$SCAN_TYPE" = "premarket" ]; then
            python main.py --time 8AM
          else
            python main.py
          fi
